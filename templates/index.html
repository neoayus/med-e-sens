<!DOCTYPE html>
<html>
<head>
<title>AI Health Monitoring System</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>AI Health Monitoring System</h1>
<p class="subtitle">Diabetes Risk Prediction using Machine Learning</p>

<form action="/predict" method="post">

<div class="form-grid">

<input type="number" step="any" name="Pregnancies" placeholder="Pregnancies"
value="{{ values.Pregnancies if values else '' }}" required>

<input type="number" step="any" name="Glucose" placeholder="Glucose Level"
value="{{ values.Glucose if values else '' }}" required>

<input type="number" step="any" name="BloodPressure" placeholder="Blood Pressure"
value="{{ values.BloodPressure if values else '' }}" required>

<input type="number" step="any" name="SkinThickness" placeholder="Skin Thickness"
value="{{ values.SkinThickness if values else '' }}" required>

<input type="number" step="any" name="Insulin" placeholder="Insulin Level"
value="{{ values.Insulin if values else '' }}" required>

<input type="number" step="any" name="BMI" placeholder="BMI"
value="{{ values.BMI if values else '' }}" required>

<input type="number" step="any" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function"
value="{{ values.DiabetesPedigreeFunction if values else '' }}" required>

<input type="number" step="any" name="Age" placeholder="Age"
value="{{ values.Age if values else '' }}" required>

</div>

<button type="submit">Predict Risk</button>

</form>

{% if prediction_text %}
<div class="result">
<h2>{{ prediction_text }}</h2>
</div>
{% endif %}

</div>

</body>
</html>
